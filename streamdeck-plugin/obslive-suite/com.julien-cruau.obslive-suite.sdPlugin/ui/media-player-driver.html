<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Media Player Driver</title>
	<link rel="stylesheet" href="shared-styles.css">
</head>
<body>
	<div class="sdpi-wrapper">
		<div class="sdpi-item">
			<div class="sdpi-item-label">Driver</div>
			<select class="sdpi-item-value" id="driverId">
				<option value="artlist">Artlist</option>

			</select>
		</div>

		<div class="sdpi-item">
			<div class="sdpi-item-label info-text">
				Select which media player to control.
			</div>
		</div>
	</div>

	<script src="media-player-driver.js"></script>
</body>
</html>
